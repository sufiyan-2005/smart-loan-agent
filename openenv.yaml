version: "1.0.0"
name: "smart-loan-approval-env"
description: "An AI agent that evaluates loan applications and matches them with bank offers based on credit score, ROI, and risk."

# Agent kya kya dekhega (Observation)
observation_space:
  type: "dict"
  fields:
    income: "float"
    credit_score: "int"
    loan_amount: "float"
    age: "int"
    is_fraud: "boolean"
    available_offers: 
      type: "list"
      description: "List of eligible bank offers based on credit score"

# Agent kya action lega (Action)
action_space:
  type: "dict"
  description: "Agent's decision and the logical reasoning behind it."
  fields:
    decision:
      type: "discrete"
      mapping: {0: "Reject", 1: "Approve"}
    justification:
      type: "string"
      description: "AI's reason for approval or rejection."

# Difficulty Levels
levels:
  easy:
    description: "Decision based only on credit score"
  medium:
    description: "Decision based on credit score + Income-to-Loan ratio"
  hard:
    description: "Includes Fraud Detection and Risk Analysis"






